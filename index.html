<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
margin:0;
padding:0;
background:transparent;
overflow:hidden;
}

model-viewer{
width:100vw;
height:100vh;
background:transparent;
}
</style>

</head>

<body>

<model-viewer
src="https://lisamqaipxvm8ibs.public.blob.vercel-storage.com/watch%20%281%29.glb"

auto-rotate
rotation-per-second="1deg"
environment-image="neutral"
exposure="1.3"
style="width:100vw;height:100vh;background:transparent;"
alpha="true">
</model-viewer>

</body>
</html>
